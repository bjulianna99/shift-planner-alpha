<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shift Planner Alpha</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [ws-template], [ws-children-template] {
            display: none;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Navbar -->
    <nav class="bg-white shadow-md border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">

                <!-- Logo / Title -->
                <div class="flex items-center">
                    <span class="text-xl font-bold text-gray-800">Shift Planner Alpha</span>
                </div>

                <!-- Desktop Menu -->
                <div class="hidden md:flex items-center space-x-6">
                    <a href="#top" class="text-gray-700 hover:text-blue-600">Home</a>
                    <a href="#sample-shifts" class="text-gray-700 hover:text-blue-600">Shifts</a>
                    <a href="#about" class="text-gray-700 hover:text-blue-600">About</a>
                </div>

                <!-- Mobile Menu Button -->
                <div class="md:hidden flex items-center">
                    <button id="menu-btn" class="text-gray-700 focus:outline-none" type="button" aria-label="Toggle menu">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                </div>

            </div>
        </div>

        <!-- Mobile Menu -->
        <div id="mobile-menu" class="hidden md:hidden px-4 pb-4 bg-white border-t border-gray-100">
            <a href="#top" class="block py-2 text-gray-700 hover:text-blue-600">Home</a>
            <a href="#sample-shifts" class="block py-2 text-gray-700 hover:text-blue-600">Shifts</a>
            <a href="#about" class="block py-2 text-gray-700 hover:text-blue-600">About</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main id="top" class="max-w-7xl mx-auto px-4 py-6">
        <div ws-hole="Content">
            <div class="space-y-4 animate-pulse">
                <div class="h-8 bg-gray-300 rounded w-1/3"></div>
                <div class="h-4 bg-gray-300 rounded w-2/3"></div>
                <div class="h-40 bg-gray-300 rounded"></div>
            </div>
        </div>
    </main>

    <script>
        const btn = document.getElementById('menu-btn');
        const menu = document.getElementById('mobile-menu');

        if (btn && menu) {
            btn.addEventListener('click', () => {
                menu.classList.toggle('hidden');
            });
        }
    </script>

    <script type="module" src="Scripts/DUE-FSharp-SPASandbox-2026.min.js"></script>
</body>
</html>
